<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xuân Bính Ngọ 2026</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playfair Display', serif;
        }

        body {
            overflow: hidden;
            margin: 0;
        }

        /* ===== Sakura Background ===== */
        .sakura-bg {
            position: fixed;
            inset: 0;
            display: flex;
            z-index: 0;
        }

        /* Hai hàng cây */
        .trees {
            width: 35%;
            height: 100%;
            background:
                radial-gradient(circle at 50% 20%, #ffb7d5 0%, #ff69b4 40%, transparent 60%),
                radial-gradient(circle at 70% 40%, #ffc0cb 0%, #ff85c1 40%, transparent 65%),
                radial-gradient(circle at 30% 60%, #ffb7d5 0%, #ff69b4 40%, transparent 65%),
                linear-gradient(to top, #5b2c2c 0%, #8b3a3a 40%, transparent 70%);
            background-size: 300px 300px, 350px 350px, 400px 400px, 100% 100%;
            background-repeat: repeat-y;
            animation: sway 6s ease-in-out infinite alternate;
        }

        /* Cây bên phải lật gương */
        .trees.right {
            transform: scaleX(-1);
        }

        /* Lối đi giữa */
        .path {
            width: 30%;
            height: 100%;
            background: linear-gradient(to bottom, #ffe6f2, #ffd6eb);
            box-shadow: inset 0 0 120px rgba(255, 255, 255, 0.7);
        }

        /* Cây đung đưa */
        @keyframes sway {
            from {
                transform: translateX(0px);
            }

            to {
                transform: translateX(10px);
            }
        }

        /* Canvas */
        canvas {
            position: fixed;
            inset: 0;
        }

        #fireworks {
            z-index: 1;
        }

        #petals {
            z-index: 5;
            pointer-events: none;
        }

        /* Nội dung giữa màn hình */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            color: #ffd700;
        }

        /* Title */
        .title {
            font-size: 60px;
            color: #ffcc66;
            text-shadow: 0 0 20px gold, 0 0 40px orange;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px gold;
            }

            to {
                text-shadow: 0 0 40px orange;
            }
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .box {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid gold;
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(6px);
        }

        .box span {
            font-size: 35px;
            display: block;
        }

        .label {
            font-size: 14px;
        }

        /* ===== Floating Wishes ===== */
        .wish-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 8;
            overflow: hidden;
        }

        .wish {
            position: absolute;
            bottom: -50px;
            font-weight: bold;
            white-space: nowrap;
            animation: floatUp linear forwards;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        @keyframes floatUp {
            from {
                transform: translateY(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            to {
                transform: translateY(-110vh);
                opacity: 0;
            }
        }

        .youtube-box {
            margin-top: 25px;
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid red;
            padding: 15px 25px;
            border-radius: 12px;
            backdrop-filter: blur(6px);
            display: inline-block;
        }

        .yt-title {
            font-size: 18px;
            color: #fff;
        }

        .yt-count {
            font-size: 32px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 10px white;
        }
    </style>

</head>

<body>

    <canvas id="fireworks"></canvas>
    <canvas id="petals"></canvas>

    <div class="content">
        <div class="title">Xuân Bính Ngọ 2026</div>

        <div class="countdown">
            <div class="box">
                <span id="days">00</span>
                <div class="label">Ngày</div>
            </div>
            <div class="box">
                <span id="hours">00</span>
                <div class="label">Giờ</div>
            </div>
            <div class="box">
                <span id="minutes">00</span>
                <div class="label">Phút</div>
            </div>
            <div class="box">
                <span id="seconds">00</span>
                <div class="label">Giây</div>
            </div>
        </div>
        <div class="youtube-box">
            <div class="yt-title">Subscriber YouTube</div>
            <div id="subCount" class="yt-count">Loading...</div>
        </div>

    </div>
    <div class="sakura-bg">
        <div class="trees left"></div>
        <div class="path"></div>
        <div class="trees right"></div>
    </div>
    <div class="wish-container" id="wishContainer"></div>

    <script>
        /* ================== COUNTDOWN (Giờ thật countdown đến giờ giao thừa 00:00 Tết Nguyên Đán) ================== */

        const tetDate = new Date("2026-02-17T00:00:00"); // **Giờ Việt Nam**
        const offset = tetDate.getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const distance = offset - now;

            document.getElementById("days").innerHTML = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerHTML = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerHTML = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerHTML = Math.floor((distance % (1000 * 60)) / 1000);
        }, 1000);


        /* ================== FIREWORKS ================== */
        const canvas = document.getElementById("fireworks");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let fireworks = [];
        let particles = [];

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * canvas.height / 2;
                this.speed = 4;
                this.color = `hsl(${Math.random() * 360},100%,60%)`;
            }

            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) {
                    for (let i = 0; i < 100; i++) {
                        particles.push(new Particle(this.x, this.y, this.color));
                    }
                    fireworks.splice(fireworks.indexOf(this), 1);
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.speedX = (Math.random() - 0.5) * 6;
                this.speedY = (Math.random() - 0.5) * 6;
                this.alpha = 1;
                this.gravity = 0.05;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.alpha -= 0.01;
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function animate() {
            ctx.fillStyle = "rgba(0,0,0,0.05)";

            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.05) {
                fireworks.push(new Firework());
            }

            fireworks.forEach((f, i) => {
                f.update();
                f.draw();
            });

            particles.forEach((p, i) => {
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    p.update();
                    p.draw();
                }
            });

            requestAnimationFrame(animate);
        }

        animate();

        /* Resize */
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });





    </script>

    <script>
        /* ================== CHERRY BLOSSOM PETALS ================== */

        const petalCanvas = document.getElementById("petals");
        const pctx = petalCanvas.getContext("2d");

        petalCanvas.width = window.innerWidth;
        petalCanvas.height = window.innerHeight;

        let petals = [];
        const petalCount = 60;

        class Petal {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * petalCanvas.width;
                this.y = Math.random() * -petalCanvas.height;
                this.size = 8 + Math.random() * 10;
                this.speedY = 1 + Math.random() * 2;
                this.speedX = Math.random() * 1;
                this.angle = Math.random() * 360;
                this.swing = Math.random() * 2;
                this.opacity = 0.6 + Math.random() * 0.4;
            }

            update() {
                this.y += this.speedY;
                this.x += Math.sin(this.y * 0.01) * this.swing;
                this.angle += 0.5;

                if (this.y > petalCanvas.height) {
                    this.reset();
                    this.y = -20;
                }
            }

            draw() {
                pctx.save();
                pctx.globalAlpha = this.opacity;
                pctx.translate(this.x, this.y);
                pctx.rotate(this.angle * Math.PI / 180);

                // Vẽ cánh hoa (hình elip)
                pctx.fillStyle = "#ffb7c5";
                pctx.beginPath();
                pctx.ellipse(0, 0, this.size * 0.6, this.size, 0, 0, Math.PI * 2);
                pctx.fill();

                pctx.restore();
            }
        }

        // Tạo cánh hoa
        for (let i = 0; i < petalCount; i++) {
            petals.push(new Petal());
        }

        function animatePetals() {
            pctx.clearRect(0, 0, petalCanvas.width, petalCanvas.height);

            petals.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animatePetals);
        }

        animatePetals();

        // Resize
        window.addEventListener("resize", () => {
            petalCanvas.width = window.innerWidth;
            petalCanvas.height = window.innerHeight;
        });

    </script>
    <script>
        /* ================== TET WISHES ================== */

        const wishes = [
            "Chúc Mừng Năm Mới 🎉",
            "An Khang Thịnh Vượng 🌸",
            "Vạn Sự Như Ý ✨",
            "Tài Lộc Đầy Nhà 💰",
            "Sức Khỏe Dồi Dào ❤️",
            "Phúc Lộc Thọ 🌼",
            "Xuân Bình An 🌿",
            "Năm Mới Thành Công 🚀",
            "Gia Đình Hạnh Phúc 🏮"
        ];

        const wishContainer = document.getElementById("wishContainer");

        function createWish() {
            const wish = document.createElement("div");
            wish.className = "wish";
            wish.innerText = wishes[Math.floor(Math.random() * wishes.length)];

            // Vị trí ngang ngẫu nhiên
            wish.style.left = Math.random() * 90 + "%";

            // Màu ngẫu nhiên
            const colors = ["#ff1493", "#ff69b4", "#ffd700", "#ff4500", "#ffffff"];
            wish.style.color = colors[Math.floor(Math.random() * colors.length)];

            // Kích thước ngẫu nhiên
            wish.style.fontSize = (18 + Math.random() * 20) + "px";

            // Thời gian bay
            const duration = 8 + Math.random() * 5;
            wish.style.animationDuration = duration + "s";

            wishContainer.appendChild(wish);

            // Xóa sau khi animation xong
            setTimeout(() => {
                wish.remove();
            }, duration * 1000);
        }

        // Tạo lời chúc mỗi 1.5 giây
        setInterval(createWish, 1500);
    </script>
<script>
const channelId = "UC5RSjX7JUH96fsx8JVoIjmw";

async function getSubscriberCount() {
    try {
        const response = await fetch(
            `https://api.socialcounts.org/youtube-live-subscriber-count/${channelId}`
        );

        const data = await response.json();

        // Lấy đúng cấu trúc JSON mới
        const subs = data?.counters?.estimation?.subscriberCount;

        if (typeof subs !== "number") {
            document.getElementById("subCount").innerText =
                "Không có dữ liệu";
            return;
        }

        document.getElementById("subCount").innerText =
            subs.toLocaleString() + " Subscribers";

    } catch (error) {
        document.getElementById("subCount").innerText =
            "Lỗi tải dữ liệu";
    }
}

getSubscriberCount();
setInterval(getSubscriberCount, 30000);
</script>
</body>

</html>
