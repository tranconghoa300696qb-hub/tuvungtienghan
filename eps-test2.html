<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPS-TOPIK YouTube Creator</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f0f2f5;
            --correct: #27ae60;
            --wrong: #e74c3c;
        }

        body {
            font-family: 'Roboto', 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app-container {
            width: 950px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            padding: 30px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 15px;
        }

        .question-text {
            font-size: 1.7rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .image-box img {
            max-width: 280px;
            height: auto;
            border-radius: 8px;
            border: 2px solid #ddd;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .option-card {
            padding: 20px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .option-card:hover {
            border-color: var(--accent);
            background: #f9f9f9;
        }

        /* Trạng thái đúng sai */
        .option-card.correct {
            background: var(--correct) !important;
            color: white;
            border-color: var(--correct);
        }

        .option-card.wrong {
            background: var(--wrong) !important;
            color: white;
            border-color: var(--wrong);
        }

        .btn-audio {
            background: #6c5ce7;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            display: inline-block;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
        }

        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }

        .btn-next {
            background: var(--accent);
            color: white;
        }
    </style>
</head>

<body>

    <div id="app-container">
        <div class="header">
            <div id="q-num" style="font-weight: bold; font-size: 1.2rem;">CÂU 1</div>
            <div class="timer">EPS-TOPIK CONTENT CREATOR</div>
        </div>

        <div class="btn-audio" onclick="speakQuestion()">🔊 Đọc đề bài</div>

        <div id="q-text" class="question-text">Đang tải câu hỏi...</div>

        <div style="text-align: center;" class="image-box" id="q-image"></div>

        <div class="options-grid" id="options"></div>

        <div class="controls">
            <button onclick="prevQuestion()">Quay lại</button>
            <button class="btn-next" onclick="nextQuestion()">Câu tiếp theo</button>
        </div>
    </div>

    <audio id="sound-correct" src="https://www.myinstants.com/media/sounds/correct.mp3"></audio>
    <audio id="sound-wrong" src="https://www.myinstants.com/media/sounds/wrong-answer.mp3"></audio>

    <script>
        const questions = [
            {
                text: "다음 그림을 보고 맞는 단어를 고르십시오.",
                translation: "Nhìn hình và chọn từ đúng.",
                image: "https://cdn-icons-png.flaticon.com/512/2853/2853814.png", // Cái túi
                options: ["가방", "구두", "모자", "안경"],
                answer: 0
            },
            {
                text: "이 사람은 무엇을 하고 있습니까?",
                translation: "Người này đang làm gì?",
                image: "https://cdn-icons-png.flaticon.com/512/1950/1950630.png", // Đọc sách
                options: ["잠을 자고 있습니다", "책을 읽고 있습니다", "전화를 하고 있습니다", "운동을 하고 있습니다"],
                answer: 1
            }
        ];

        let currentIdx = 0;
        let canClick = true;

        function loadQuestion(idx) {
            canClick = true;
            const q = questions[idx];
            document.getElementById('q-num').innerText = `CÂU ${idx + 1}`;
            document.getElementById('q-text').innerHTML = `${q.text}<br><span style="font-size: 1.2rem; color: #666;">(${q.translation})</span>`;
            document.getElementById('q-image').innerHTML = `<img src="${q.image}">`;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            q.options.forEach((opt, i) => {
                optionsDiv.innerHTML += `<div class="option-card" onclick="checkAnswer(this, ${i})">
                <span style="margin-right:15px; font-weight:bold;">${i + 1}.</span> ${opt}
            </div>`;
            });
        }

        function checkAnswer(el, selectedIdx) {
            if (!canClick) return;
            canClick = false;

            const correctIdx = questions[currentIdx].answer;
            if (selectedIdx === correctIdx) {
                el.classList.add('correct');
                document.getElementById('sound-correct').play();
            } else {
                el.classList.add('wrong');
                document.getElementById('sound-wrong').play();
                // Hiện luôn đáp án đúng để giảng bài
                document.querySelectorAll('.option-card')[correctIdx].classList.add('correct');
            }

            // Tự động đọc từ đã chọn (Giọng Hàn)
            speakText(questions[currentIdx].options[selectedIdx], 'ko-KR');
        }

        function speakQuestion() {
            const q = questions[currentIdx];
            // Đọc đề tiếng Hàn (Giọng Sun-Hi)
            speakText(q.text, 'ko-KR');

            // Sau 2 giây đọc dịch tiếng Việt (Giọng Hoài My)
            //  setTimeout(() => {
            //  speakText(q.translation, 'vi-VN');
            // }, 3000);
        }

        function speakText(text, lang) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.9; // Đọc chậm một chút để học sinh dễ nghe

            // Tìm giọng phù hợp nếu có
            const voices = window.speechSynthesis.getVoices();
            if (lang === 'ko-KR') {
                const sunHi = voices.find(v => v.name.includes('Sun-Hi') || v.name.includes('Korean'));
                if (sunHi) utterance.voice = sunHi;
            } else if (lang === 'vi-VN') {
                const hoaiMy = voices.find(v => v.name.includes('Hoài My') || v.name.includes('Vietnamese'));
                if (hoaiMy) utterance.voice = hoaiMy;
            }

            window.speechSynthesis.speak(utterance);
        }

        function nextQuestion() {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                loadQuestion(currentIdx);
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                loadQuestion(currentIdx);
            }
        }

        // Đợi giọng đọc tải xong
        window.speechSynthesis.onvoiceschanged = () => { loadQuestion(0); };
        loadQuestion(0);
    </script>

</body>

</html>
