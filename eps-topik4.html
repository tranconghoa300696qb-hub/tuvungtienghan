<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>EPS-TOPIK Perfect Center 1280x720</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #e9ecef;
            --correct: #27ae60;
            --wrong: #e74c3c;
        }

        /* KHUNG HÌNH CHUẨN - LUÔN GIỮA MÀN HÌNH */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%; 
            /* Nếu dùng OBS thì để width: 1280px; height: 720px; */
            background-color: var(--bg);
            font-family: 'Roboto', 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center; /* Căn giữa ngang */
            align-items: center;     /* Căn giữa dọc */
            overflow: hidden;
        }

        /* KHUNG LÀM BÀI */
        #app-container {
            width: 950px; 
            min-height: 600px; /* Cố định chiều cao tối thiểu để không bị lệch */
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            padding: 30px 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border-top: 8px solid var(--accent);
            text-align: left; 
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        /* PHẦN NỘI DUNG CHÍNH - CÓ THỂ CUỘN NẾU QUÁ DÀI */
        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .q-text { 
            font-size: 2rem; 
            font-weight: 700; 
            color: var(--primary); 
            line-height: 1.4;
            margin-bottom: 5px;
        }

        .q-trans { 
            font-size: 1.3rem; 
            color: #666; 
            margin-bottom: 20px;
            font-style: italic;
        }

        .image-box {
            margin-bottom: 20px;
            text-align: center; /* Để ảnh ở giữa trong khung nội dung căn trái */
        }
        .image-box img {
            max-height: 200px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px;
            margin-bottom: 10px;
        }

        .option-card {
            padding: 18px 25px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            background: #fff;
        }

        .option-card:hover { border-color: var(--accent); background: #f9fbff; }
        .option-card.correct { background: var(--correct) !important; color: white; border-color: var(--correct); }
        .option-card.wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong); }

        .btn-audio {
            background: #6c5ce7;
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 15px;
            display: inline-block;
            font-weight: bold;
            font-size: 1rem;
        }

        .controls {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-next { background: var(--accent); color: white; }
        .btn-prev { background: #95a5a6; color: white; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <div id="q-num" style="font-weight: bold; font-size: 1.3rem; color: var(--accent);">CÂU 1 / 2</div>
        <div style="color: #bbb; font-size: 1rem;">EPS-TOPIK KOREA</div>
    </div>

    <div class="main-content">
        <div class="btn-audio" onclick="speakQuestion()">🔊 Nghe đề (Hoài My & Sun-Hi)</div>

        <div id="q-text" class="q-text"></div>
        <div id="q-trans" class="q-trans"></div>

        <div class="image-box" id="q-image"></div>

        <div class="options-grid" id="options"></div>
    </div>

    <div class="controls">
        <button class="btn-prev" onclick="prevQuestion()">Quay lại</button>
        <button class="btn-next" onclick="nextQuestion()">Tiếp theo »</button>
    </div>
</div>

<audio id="sound-correct" src="https://www.myinstants.com/media/sounds/correct.mp3"></audio>
<audio id="sound-wrong" src="https://www.myinstants.com/media/sounds/wrong-answer.mp3"></audio>

<script>
    const questions = [
        {
            text: "다음 그림을 보고 맞는 단어를 고르십시오.",
            translation: "Nhìn hình vẽ sau và chọn từ đúng.",
            image: "https://cdn-icons-png.flaticon.com/512/2853/2853814.png",
            options: ["가방", "구두", "모자", "안경"],
            answer: 0 
        },
        {
            text: "이 사람은 무엇을 하고 있습니까?",
            translation: "Người này đang làm gì?",
            image: "https://cdn-icons-png.flaticon.com/512/1950/1950630.png",
            options: ["잠을 자고 있습니다", "책을 읽고 있습니다", "전화를 하고 있습니다", "운동을 하고 있습니다"],
            answer: 1
        }
    ];

    let currentIdx = 0;
    let canClick = true;

    function loadQuestion(idx) {
        window.speechSynthesis.cancel();
        canClick = true;
        const q = questions[idx];
        
        document.getElementById('q-num').innerText = `CÂU ${idx + 1} / ${questions.length}`;
        document.getElementById('q-text').innerText = q.text;
        document.getElementById('q-trans').innerText = `(${q.translation})`;
        document.getElementById('q-image').innerHTML = `<img src="${q.image}">`;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.options.forEach((opt, i) => {
            optionsDiv.innerHTML += `<div class="option-card" onclick="checkAnswer(this, ${i})">
                <span style="margin-right:15px; font-weight:bold; color:var(--accent);">${i+1}.</span> ${opt}
            </div>`;
        });

        setTimeout(speakQuestion, 800);
    }

    function checkAnswer(el, selectedIdx) {
        if (!canClick) return;
        canClick = false;
        const correctIdx = questions[currentIdx].answer;
        if (selectedIdx === correctIdx) {
            el.classList.add('correct');
            document.getElementById('sound-correct').play();
        } else {
            el.classList.add('wrong');
            document.getElementById('sound-wrong').play();
            document.querySelectorAll('.option-card')[correctIdx].classList.add('correct');
        }
        speakText(questions[currentIdx].options[selectedIdx], 'ko-KR', 'Sun-Hi');
    }

    function speakQuestion() {
        window.speechSynthesis.cancel();
        const q = questions[currentIdx];
        const speakHan = new SpeechSynthesisUtterance(q.text);
        setVoice(speakHan, 'ko-KR', 'Sun-Hi');
        const speakViet = new SpeechSynthesisUtterance(q.translation);
        setVoice(speakViet, 'vi-VN', 'Hoài My');
        window.speechSynthesis.speak(speakHan);
        speakHan.onend = () => { setTimeout(() => window.speechSynthesis.speak(speakViet), 500); };
    }

    function speakText(text, lang, name) {
        const u = new SpeechSynthesisUtterance(text);
        setVoice(u, lang, name);
        window.speechSynthesis.speak(u);
    }

    function setVoice(u, lang, name) {
        u.lang = lang; u.rate = 0.9;
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes(name)) || voices.find(v => v.lang.startsWith(lang.split('-')[0]));
        if (voice) u.voice = voice;
    }

    function nextQuestion() { if (currentIdx < questions.length - 1) { currentIdx++; loadQuestion(currentIdx); } }
    function prevQuestion() { if (currentIdx > 0) { currentIdx--; loadQuestion(currentIdx); } }

    window.speechSynthesis.onvoiceschanged = () => { if(!document.getElementById('q-text').innerText) loadQuestion(0); };
    loadQuestion(0);
</script>
</body>
</html>
